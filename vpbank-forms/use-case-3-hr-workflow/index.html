<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPBank - Đơn Nội Bộ HR</title>
  <link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
  <div class="container">
    <form id="hrWorkflowForm" class="vpbank-form">
      <div class="form-header">
        <h1>Đơn Nội Bộ HR</h1>
        <p>Hệ thống quản lý nhân sự - Human Resources</p>
      </div>

      <!-- Employee Information -->
      <div class="form-section">
        <h2>Thông Tin Nhân Viên</h2>
        
        <div class="form-row">
          <div class="form-group">
            <label for="employeeName">
              Họ và Tên <span class="required">*</span>
            </label>
            <input type="text" id="employeeName" name="employeeName" required>
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="employeeId">
              Mã Nhân Viên <span class="required">*</span>
            </label>
            <input type="text" id="employeeId" name="employeeId" required>
            <span class="error-message"></span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="department">
              Phòng Ban <span class="required">*</span>
            </label>
            <select id="department" name="department" required>
              <option value="">-- Chọn phòng ban --</option>
              <option value="retail-lending">Retail Lending</option>
              <option value="customer-service">Customer Service</option>
              <option value="human-resources">Human Resources</option>
              <option value="risk-compliance">Risk & Compliance</option>
              <option value="operations">Operations</option>
              <option value="it">IT</option>
              <option value="finance">Finance</option>
              <option value="marketing">Marketing</option>
              <option value="sales">Sales</option>
              <option value="other">Khác</option>
            </select>
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="position">
              Chức Vụ
            </label>
            <input type="text" id="position" name="position">
            <span class="error-message"></span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">
              Email <span class="required">*</span>
            </label>
            <input type="email" id="email" name="email" required>
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="phoneNumber">
              Số Điện Thoại
            </label>
            <input type="tel" id="phoneNumber" name="phoneNumber">
            <span class="error-message"></span>
          </div>
        </div>
      </div>

      <!-- Request Information -->
      <div class="form-section">
        <h2>Thông Tin Yêu Cầu</h2>
        
        <div class="form-group">
          <label for="requestType">
            Loại Đơn <span class="required">*</span>
          </label>
          <select id="requestType" name="requestType" required>
            <option value="">-- Chọn loại đơn --</option>
            <option value="leave">Nghỉ phép</option>
            <option value="business-trip">Công tác</option>
            <option value="training">Đào tạo</option>
            <option value="equipment">Yêu cầu trang thiết bị</option>
            <option value="reimbursement">Hoàn ứng chi phí</option>
            <option value="certificate">Xin giấy xác nhận</option>
            <option value="resignation">Xin nghỉ việc</option>
            <option value="other">Khác</option>
          </select>
          <span class="error-message"></span>
        </div>

        <div class="form-group" id="leaveTypeGroup" style="display: none;">
          <label for="leaveType">
            Loại Nghỉ Phép
          </label>
          <select id="leaveType" name="leaveType">
            <option value="">-- Chọn loại nghỉ phép --</option>
            <option value="annual">Nghỉ phép năm</option>
            <option value="sick">Nghỉ ốm</option>
            <option value="personal">Nghỉ cá nhân</option>
            <option value="unpaid">Nghỉ không lương</option>
            <option value="maternity">Nghỉ thai sản</option>
            <option value="paternity">Nghỉ chăm con</option>
            <option value="wedding">Nghỉ cưới</option>
            <option value="funeral">Nghỉ tang</option>
          </select>
          <span class="error-message"></span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="startDate">
              Ngày Bắt Đầu <span class="required">*</span>
            </label>
            <input type="date" id="startDate" name="startDate" required>
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="endDate">
              Ngày Kết Thúc <span class="required">*</span>
            </label>
            <input type="date" id="endDate" name="endDate" required>
            <span class="error-message"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="duration">
            Số Ngày
          </label>
          <input type="number" id="duration" name="duration" min="0" step="0.5" readonly>
          <span class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="reason">
            Lý Do <span class="required">*</span>
          </label>
          <textarea id="reason" name="reason" required placeholder="Mô tả lý do yêu cầu..."></textarea>
          <span class="error-message"></span>
        </div>
      </div>

      <!-- Approval Information -->
      <div class="form-section">
        <h2>Thông Tin Phê Duyệt</h2>
        
        <div class="form-row">
          <div class="form-group">
            <label for="managerName">
              Tên Quản Lý Trực Tiếp <span class="required">*</span>
            </label>
            <input type="text" id="managerName" name="managerName" required>
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="managerEmail">
              Email Quản Lý
            </label>
            <input type="email" id="managerEmail" name="managerEmail">
            <span class="error-message"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="approvalStatus">
            Trạng Thái <span class="required">*</span>
          </label>
          <select id="approvalStatus" name="approvalStatus" required>
            <option value="pending">Chờ phê duyệt</option>
            <option value="approved">Đã phê duyệt</option>
            <option value="rejected">Từ chối</option>
            <option value="cancelled">Đã hủy</option>
          </select>
          <span class="error-message"></span>
        </div>

        <div class="form-group" id="rejectionReasonGroup" style="display: none;">
          <label for="rejectionReason">
            Lý Do Từ Chối
          </label>
          <textarea id="rejectionReason" name="rejectionReason"></textarea>
          <span class="error-message"></span>
        </div>
      </div>

      <!-- Additional Information -->
      <div class="form-section">
        <h2>Thông Tin Bổ Sung</h2>
        
        <div class="form-group">
          <label for="submissionDate">
            Ngày Nộp Đơn <span class="required">*</span>
          </label>
          <input type="date" id="submissionDate" name="submissionDate" required>
          <span class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="contactDuringAbsence">
            Thông Tin Liên Lạc (Khi Nghỉ)
          </label>
          <input type="text" id="contactDuringAbsence" name="contactDuringAbsence" placeholder="Số điện thoại, email dự phòng">
          <span class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="workHandover">
            Bàn Giao Công Việc
          </label>
          <textarea id="workHandover" name="workHandover" placeholder="Người nhận bàn giao, công việc cần xử lý..."></textarea>
          <span class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="attachments">
            File Đính Kèm (nếu có)
          </label>
          <input type="file" id="attachments" name="attachments" multiple>
          <span class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="notes">
            Ghi Chú
          </label>
          <textarea id="notes" name="notes" placeholder="Các thông tin bổ sung khác..."></textarea>
          <span class="error-message"></span>
        </div>
      </div>

      <!-- Form Actions -->
      <div class="form-actions">
        <button type="button" class="btn-secondary" id="clearBtn">Xóa Form</button>
        <button type="button" class="btn-secondary" id="aiTestBtn">Test AI</button>
        <button type="submit" class="btn-primary">Gửi Đơn</button>
      </div>
    </form>
  </div>

  <!-- Confirmation Modal -->
  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Xác Nhận</h3>
      </div>
      <div class="modal-body">
        <p>Bạn có chắc chắn muốn thực hiện thao tác này không?</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary btn-cancel">Hủy</button>
        <button type="button" class="btn-primary btn-confirm">Xác Nhận</button>
      </div>
    </div>
  </div>

  <script src="../shared/utils.js"></script>
  <script src="../shared/ai-integration.js"></script>
  <script src="script.js"></script>
</body>
</html>
