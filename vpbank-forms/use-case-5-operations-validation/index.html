<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPBank - Kiểm Tra Giao Dịch</title>
  <link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
  <div class="container">
    <form id="operationsForm" class="vpbank-form">
      <div class="form-header">
        <h1>Kiểm Tra & Xác Thực Giao Dịch</h1>
        <p>Hệ thống vận hành - Operations</p>
      </div>

      <!-- Customer Information -->
      <div class="form-section">
        <h2>Thông Tin Khách Hàng</h2>
        
        <div class="form-row">
          <div class="form-group">
            <label for="customerName">
              Họ và Tên <span class="required">*</span>
            </label>
            <input type="text" id="customerName" name="customerName" required>
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="customerId">
              Mã Khách Hàng <span class="required">*</span>
            </label>
            <input type="text" id="customerId" name="customerId" required>
            <span class="error-message"></span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="accountNumber">
              Số Tài Khoản <span class="required">*</span>
            </label>
            <input type="text" id="accountNumber" name="accountNumber" required>
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="phoneNumber">
              Số Điện Thoại
            </label>
            <input type="tel" id="phoneNumber" name="phoneNumber">
            <span class="error-message"></span>
          </div>
        </div>
      </div>

      <!-- Transaction Information -->
      <div class="form-section">
        <h2>Thông Tin Giao Dịch</h2>
        
        <div class="form-row">
          <div class="form-group">
            <label for="transactionId">
              Mã Giao Dịch <span class="required">*</span>
            </label>
            <input type="text" id="transactionId" name="transactionId" required>
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="transactionDate">
              Ngày Giao Dịch <span class="required">*</span>
            </label>
            <input type="date" id="transactionDate" name="transactionDate" required>
            <span class="error-message"></span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="transactionTime">
              Thời Gian Giao Dịch
            </label>
            <input type="time" id="transactionTime" name="transactionTime">
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="transactionAmount">
              Số Tiền (VNĐ) <span class="required">*</span>
            </label>
            <input type="number" id="transactionAmount" name="transactionAmount" min="0" step="1000" required>
            <span class="error-message"></span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="transactionType">
              Loại Giao Dịch <span class="required">*</span>
            </label>
            <select id="transactionType" name="transactionType" required>
              <option value="">-- Chọn loại giao dịch --</option>
              <option value="deposit">Gửi tiền</option>
              <option value="withdrawal">Rút tiền</option>
              <option value="transfer">Chuyển khoản</option>
              <option value="payment">Thanh toán</option>
              <option value="loan-disbursement">Giải ngân vay</option>
              <option value="loan-payment">Trả nợ vay</option>
              <option value="fee">Thu phí</option>
              <option value="refund">Hoàn tiền</option>
            </select>
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="channel">
              Kênh Giao Dịch <span class="required">*</span>
            </label>
            <select id="channel" name="channel" required>
              <option value="">-- Chọn kênh --</option>
              <option value="branch">Chi nhánh</option>
              <option value="atm">ATM</option>
              <option value="online">Online Banking</option>
              <option value="mobile">Mobile Banking</option>
              <option value="pos">POS</option>
              <option value="agent">Điểm giao dịch</option>
            </select>
            <span class="error-message"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="transactionDescription">
            Mô Tả Giao Dịch
          </label>
          <textarea id="transactionDescription" name="transactionDescription" placeholder="Nội dung, diễn giải giao dịch..."></textarea>
          <span class="error-message"></span>
        </div>
      </div>

      <!-- Beneficiary Information (for transfers) -->
      <div class="form-section" id="beneficiarySection" style="display: none;">
        <h2>Thông Tin Người Nhận</h2>
        
        <div class="form-group">
          <label for="beneficiaryName">
            Tên Người Nhận
          </label>
          <input type="text" id="beneficiaryName" name="beneficiaryName">
          <span class="error-message"></span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="beneficiaryAccount">
              Số Tài Khoản Người Nhận
            </label>
            <input type="text" id="beneficiaryAccount" name="beneficiaryAccount">
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="beneficiaryBank">
              Ngân Hàng
            </label>
            <input type="text" id="beneficiaryBank" name="beneficiaryBank">
            <span class="error-message"></span>
          </div>
        </div>
      </div>

      <!-- Transaction Status -->
      <div class="form-section">
        <h2>Trạng Thái Giao Dịch</h2>
        
        <div class="form-row">
          <div class="form-group">
            <label for="status">
              Trạng Thái <span class="required">*</span>
            </label>
            <select id="status" name="status" required>
              <option value="">-- Chọn trạng thái --</option>
              <option value="pending">Đang xử lý</option>
              <option value="completed">Hoàn thành</option>
              <option value="failed">Thất bại</option>
              <option value="cancelled">Đã hủy</option>
              <option value="reversed">Đã đảo ngược</option>
            </select>
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="processingSystem">
              Hệ Thống Xử Lý
            </label>
            <select id="processingSystem" name="processingSystem">
              <option value="">-- Chọn --</option>
              <option value="core-banking">Core Banking</option>
              <option value="payment-gateway">Payment Gateway</option>
              <option value="napas">NAPAS</option>
              <option value="swift">SWIFT</option>
              <option value="other">Khác</option>
            </select>
            <span class="error-message"></span>
          </div>
        </div>

        <div class="form-group" id="failureReasonGroup" style="display: none;">
          <label for="failureReason">
            Lý Do Thất Bại
          </label>
          <textarea id="failureReason" name="failureReason"></textarea>
          <span class="error-message"></span>
        </div>
      </div>

      <!-- Validation & Reconciliation -->
      <div class="form-section">
        <h2>Kiểm Tra & Đối Soát</h2>
        
        <div class="form-row">
          <div class="form-group">
            <label for="validationResult">
              Kết Quả Kiểm Tra <span class="required">*</span>
            </label>
            <select id="validationResult" name="validationResult" required>
              <option value="">-- Chọn kết quả --</option>
              <option value="valid">Hợp lệ</option>
              <option value="invalid">Không hợp lệ</option>
              <option value="needs-review">Cần xem xét</option>
              <option value="suspicious">Nghi ngờ</option>
            </select>
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="reviewerName">
              Người Kiểm Tra <span class="required">*</span>
            </label>
            <input type="text" id="reviewerName" name="reviewerName" required>
            <span class="error-message"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="reviewDate">
            Ngày Kiểm Tra <span class="required">*</span>
          </label>
          <input type="date" id="reviewDate" name="reviewDate" required>
          <span class="error-message"></span>
        </div>

        <div class="form-group" id="validationIssuesGroup" style="display: none;">
          <label for="validationIssues">
            Vấn Đề Phát Hiện
          </label>
          <textarea id="validationIssues" name="validationIssues" placeholder="Mô tả các vấn đề hoặc bất thường phát hiện..."></textarea>
          <span class="error-message"></span>
        </div>
      </div>

      <!-- Balance Check -->
      <div class="form-section">
        <h2>Kiểm Tra Số Dư</h2>
        
        <div class="form-row">
          <div class="form-group">
            <label for="balanceBefore">
              Số Dư Trước Giao Dịch (VNĐ)
            </label>
            <input type="number" id="balanceBefore" name="balanceBefore" min="0" step="1000">
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="balanceAfter">
              Số Dư Sau Giao Dịch (VNĐ)
            </label>
            <input type="number" id="balanceAfter" name="balanceAfter" min="0" step="1000">
            <span class="error-message"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="balanceStatus">
            Trạng Thái Đối Soát
          </label>
          <select id="balanceStatus" name="balanceStatus">
            <option value="">-- Chọn --</option>
            <option value="matched">Khớp</option>
            <option value="mismatched">Không khớp</option>
            <option value="pending">Đang kiểm tra</option>
          </select>
          <span class="error-message"></span>
        </div>
      </div>

      <!-- Fraud Detection -->
      <div class="form-section">
        <h2>Phát Hiện Gian Lận</h2>
        
        <div class="form-row">
          <div class="form-group">
            <label for="fraudScore">
              Điểm Rủi Ro (0-100)
            </label>
            <input type="number" id="fraudScore" name="fraudScore" min="0" max="100">
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="fraudIndicators">
              Dấu Hiệu Bất Thường
            </label>
            <select id="fraudIndicators" name="fraudIndicators">
              <option value="">-- Chọn --</option>
              <option value="none">Không có</option>
              <option value="velocity">Tần suất cao</option>
              <option value="amount">Số tiền bất thường</option>
              <option value="location">Vị trí lạ</option>
              <option value="pattern">Mẫu giao dịch lạ</option>
              <option value="multiple">Nhiều dấu hiệu</option>
            </select>
            <span class="error-message"></span>
          </div>
        </div>

        <div class="form-group" id="fraudDetailsGroup" style="display: none;">
          <label for="fraudDetails">
            Chi Tiết Dấu Hiệu Gian Lận
          </label>
          <textarea id="fraudDetails" name="fraudDetails"></textarea>
          <span class="error-message"></span>
        </div>
      </div>

      <!-- Additional Notes -->
      <div class="form-section">
        <h2>Ghi Chú</h2>
        
        <div class="form-group">
          <label for="notes">
            Ghi Chú Kiểm Tra
          </label>
          <textarea id="notes" name="notes" placeholder="Các thông tin bổ sung, nhận xét về giao dịch..."></textarea>
          <span class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="actionRequired">
            Hành Động Cần Thiết
          </label>
          <textarea id="actionRequired" name="actionRequired" placeholder="Các bước tiếp theo cần thực hiện..."></textarea>
          <span class="error-message"></span>
        </div>
      </div>

      <!-- Form Actions -->
      <div class="form-actions">
        <button type="button" class="btn-secondary" id="clearBtn">Xóa Form</button>
        <button type="button" class="btn-secondary" id="aiTestBtn">Test AI</button>
        <button type="submit" class="btn-primary">Xác Nhận Kiểm Tra</button>
      </div>
    </form>
  </div>

  <!-- Confirmation Modal -->
  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Xác Nhận</h3>
      </div>
      <div class="modal-body">
        <p>Bạn có chắc chắn muốn thực hiện thao tác này không?</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary btn-cancel">Hủy</button>
        <button type="button" class="btn-primary btn-confirm">Xác Nhận</button>
      </div>
    </div>
  </div>

  <script src="../shared/utils.js"></script>
  <script src="../shared/ai-integration.js"></script>
  <script src="script.js"></script>
</body>
</html>
