<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPBank - Cập Nhật CRM & Log Tương Tác</title>
  <link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
  <div class="container">
    <form id="crmUpdateForm" class="vpbank-form">
      <div class="form-header">
        <h1>Cập Nhật CRM & Log Tương Tác</h1>
        <p>Hệ thống chăm sóc khách hàng - Customer Service</p>
      </div>

      <!-- Customer Information -->
      <div class="form-section">
        <h2>Thông Tin Khách Hàng</h2>
        
        <div class="form-row">
          <div class="form-group">
            <label for="customerName">
              Họ và Tên <span class="required">*</span>
            </label>
            <input type="text" id="customerName" name="customerName" required>
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="customerId">
              Mã Khách Hàng <span class="required">*</span>
            </label>
            <input type="text" id="customerId" name="customerId" required>
            <span class="error-message"></span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="phoneNumber">
              Số Điện Thoại <span class="required">*</span>
            </label>
            <input type="tel" id="phoneNumber" name="phoneNumber" required>
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="email">
              Email
            </label>
            <input type="email" id="email" name="email">
            <span class="error-message"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="address">
            Địa Chỉ
          </label>
          <textarea id="address" name="address" placeholder="Cập nhật địa chỉ mới nếu có thay đổi"></textarea>
          <span class="error-message"></span>
        </div>
      </div>

      <!-- Interaction Details -->
      <div class="form-section">
        <h2>Chi Tiết Tương Tác</h2>
        
        <div class="form-row">
          <div class="form-group">
            <label for="interactionType">
              Loại Tương Tác <span class="required">*</span>
            </label>
            <select id="interactionType" name="interactionType" required>
              <option value="">-- Chọn loại --</option>
              <option value="call">Cuộc gọi</option>
              <option value="email">Email</option>
              <option value="visit">Gặp trực tiếp</option>
              <option value="chat">Chat online</option>
              <option value="sms">SMS</option>
            </select>
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="interactionDate">
              Ngày Tương Tác <span class="required">*</span>
            </label>
            <input type="date" id="interactionDate" name="interactionDate" required>
            <span class="error-message"></span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="interactionTime">
              Thời Gian
            </label>
            <input type="time" id="interactionTime" name="interactionTime">
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="duration">
              Thời Lượng (phút)
            </label>
            <input type="number" id="duration" name="duration" min="0" placeholder="Thời gian tương tác">
            <span class="error-message"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="agentName">
            Tên Nhân Viên <span class="required">*</span>
          </label>
          <input type="text" id="agentName" name="agentName" required>
          <span class="error-message"></span>
        </div>
      </div>

      <!-- Issue & Resolution -->
      <div class="form-section">
        <h2>Vấn Đề & Giải Quyết</h2>
        
        <div class="form-group">
          <label for="issueCategory">
            Danh Mục Vấn Đề <span class="required">*</span>
          </label>
          <select id="issueCategory" name="issueCategory" required>
            <option value="">-- Chọn danh mục --</option>
            <option value="account">Tài khoản</option>
            <option value="card">Thẻ</option>
            <option value="loan">Vay vốn</option>
            <option value="transaction">Giao dịch</option>
            <option value="complaint">Khiếu nại</option>
            <option value="information">Tư vấn thông tin</option>
            <option value="service">Dịch vụ</option>
            <option value="other">Khác</option>
          </select>
          <span class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="issueDescription">
            Mô Tả Vấn Đề <span class="required">*</span>
          </label>
          <textarea id="issueDescription" name="issueDescription" required placeholder="Mô tả chi tiết vấn đề khách hàng gặp phải..."></textarea>
          <span class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="resolutionStatus">
            Trạng Thái Xử Lý <span class="required">*</span>
          </label>
          <select id="resolutionStatus" name="resolutionStatus" required>
            <option value="">-- Chọn trạng thái --</option>
            <option value="resolved">Đã giải quyết</option>
            <option value="pending">Đang xử lý</option>
            <option value="escalated">Đã chuyển lên cấp trên</option>
            <option value="cancelled">Đã hủy</option>
          </select>
          <span class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="resolutionDetails">
            Chi Tiết Giải Quyết
          </label>
          <textarea id="resolutionDetails" name="resolutionDetails" placeholder="Mô tả cách giải quyết hoặc bước tiếp theo..."></textarea>
          <span class="error-message"></span>
        </div>
      </div>

      <!-- Customer Satisfaction -->
      <div class="form-section">
        <h2>Đánh Giá Khách Hàng</h2>
        
        <div class="form-row">
          <div class="form-group">
            <label for="satisfactionRating">
              Mức Độ Hài Lòng
            </label>
            <select id="satisfactionRating" name="satisfactionRating">
              <option value="">-- Chọn --</option>
              <option value="5">⭐⭐⭐⭐⭐ Rất hài lòng</option>
              <option value="4">⭐⭐⭐⭐ Hài lòng</option>
              <option value="3">⭐⭐⭐ Bình thường</option>
              <option value="2">⭐⭐ Không hài lòng</option>
              <option value="1">⭐ Rất không hài lòng</option>
            </select>
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="followUpRequired">
              Cần Theo Dõi
            </label>
            <select id="followUpRequired" name="followUpRequired">
              <option value="">-- Chọn --</option>
              <option value="yes">Có</option>
              <option value="no">Không</option>
            </select>
            <span class="error-message"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="followUpDate">
            Ngày Theo Dõi
          </label>
          <input type="date" id="followUpDate" name="followUpDate">
          <span class="error-message"></span>
        </div>
      </div>

      <!-- Additional Notes -->
      <div class="form-section">
        <h2>Ghi Chú</h2>
        
        <div class="form-group">
          <label for="notes">
            Ghi Chú Thêm
          </label>
          <textarea id="notes" name="notes" placeholder="Các thông tin bổ sung, lưu ý đặc biệt..."></textarea>
          <span class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="tags">
            Tags (phân cách bằng dấu phẩy)
          </label>
          <input type="text" id="tags" name="tags" placeholder="VIP, urgent, follow-up">
          <span class="error-message"></span>
        </div>
      </div>

      <!-- Form Actions -->
      <div class="form-actions">
        <button type="button" class="btn-secondary" id="clearBtn">Xóa Form</button>
        <button type="button" class="btn-secondary" id="aiTestBtn">Test AI</button>
        <button type="submit" class="btn-primary">Cập Nhật CRM</button>
      </div>
    </form>
  </div>

  <!-- Confirmation Modal -->
  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Xác Nhận</h3>
      </div>
      <div class="modal-body">
        <p>Bạn có chắc chắn muốn thực hiện thao tác này không?</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary btn-cancel">Hủy</button>
        <button type="button" class="btn-primary btn-confirm">Xác Nhận</button>
      </div>
    </div>
  </div>

  <script src="../shared/utils.js"></script>
  <script src="../shared/ai-integration.js"></script>
  <script src="script.js"></script>
</body>
</html>
